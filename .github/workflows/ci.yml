name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install Ur/Web
        run: nix profile install nixpkgs#urweb

      - name: Add Ur/Web to PATH
        run: echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client ripgrep

      - name: Toolchain versions
        run: |
          urweb -version
          psql --version
          rg --version

      - name: Run tests
        run: make test
