name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Install Ur/Web
        run: |
          store_path=$(nix build --print-out-paths --no-link 'nixpkgs#urweb')
          echo "${store_path}/bin" >> "$GITHUB_PATH"
          ${store_path}/bin/urweb -version

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client ripgrep

      - name: Run tests
        run: |
          pg_isready -h localhost -U postgres -d postgres
          start=$(date +%s)
          timeout 600 bash -c '
            set -euo pipefail
            make schema
            make test-db
            make tests/test.exe tests/http.exe
            bash tests/run.sh
          '
          echo "Run tests step: $(( $(date +%s) - start ))s"
