name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Install Ur/Web
        id: urweb
        run: |
          store_path=$(nix build --print-out-paths --no-link 'nixpkgs#urweb')
          echo "${store_path}/bin" >> "$GITHUB_PATH"
          echo "version=$(${store_path}/bin/urweb -numeric-version)" >> "$GITHUB_OUTPUT"
          ${store_path}/bin/urweb -version

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client ripgrep ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-uw${{ steps.urweb.outputs.version }}-${{ hashFiles('app.urp', 'tests/test.urp', 'tests/http.urp', 'config.mk', 'Makefile', 'schema/**', 'src/**', 'tests/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-uw${{ steps.urweb.outputs.version }}-

      - name: Restore Ur/Web build cache
        uses: actions/cache@v4
        id: urweb-build-cache
        with:
          path: |
            tests/test.exe
            tests/http.exe
          key: urweb-build-${{ runner.os }}-uw${{ steps.urweb.outputs.version }}-${{ hashFiles('app.urp', 'tests/test.urp', 'tests/http.urp', 'config.mk', 'Makefile', 'schema/**', 'src/**', 'tests/**') }}
          restore-keys: |
            urweb-build-${{ runner.os }}-uw${{ steps.urweb.outputs.version }}-

      - name: Run tests
        run: |
          pg_isready -h localhost -U postgres -d postgres
          ccache -z
          if [ "${{ steps.urweb-build-cache.outputs.cache-hit }}" = "true" ]; then \
            echo "Ur/Web build cache hit."; \
          else \
            echo "Ur/Web build cache miss; compiling tests/test.exe and tests/http.exe in parallel."; \
            echo "(schema/schema.sql is committed, so CI does not run urweb app for test-db.)"; \
          fi
          make -j2 test URWEB_CCOMPILER='ccache gcc'
          ccache -s
