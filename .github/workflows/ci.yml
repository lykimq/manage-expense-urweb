name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGSSLMODE: disable
      URWEB_INSTALLABLE: github:NixOS/nixpkgs/nixos-24.05#urweb

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Install Ur/Web
        run: |
          # Pin nixpkgs: bare nixpkgs# resolves to flakehub weekly (gcc 15 + urweb 20200209).
          store_path=$(nix build --print-out-paths --no-link "$URWEB_INSTALLABLE")
          echo "${store_path}/bin" >> "$GITHUB_PATH"
          # GITHUB_PATH applies to later steps only; use store path here.
          "${store_path}/bin/urweb" -version

      - name: Install runner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client ripgrep curl

      - name: Run tests
        run: |
          pg_isready -h localhost -U postgres -d postgres
          start=$(date +%s)
          step() { echo "== $1 =="; date -u +%H:%M:%S; }

          step "test-db"
          make test-db

          step "tests/test.exe"
          make tests/test.exe

          step "tests/http.exe"
          make tests/http.exe

          step "tests/run.sh"
          bash tests/run.sh

          echo "Run tests step: $(( $(date +%s) - start ))s"
